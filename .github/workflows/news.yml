name: News RSS Feed
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
jobs:
  get-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          NOTION_API_TOKEN: $ secrets.NOTION_API_TOKEN 
          NOTION_FEEDS_DATABASE_ID: $ secrets.NEWS_FEEDS_DATABASE_ID 
          NOTION_READER_DATABASE_ID: $ secrets.NEWS_READER_DATABASE_ID 
          FEISHU_WEBHOOK_URL: "https://example.com"